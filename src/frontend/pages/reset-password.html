<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password | ZohoCine</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Styles -->
    <link rel="stylesheet" href="/styles/structure.css" />
    <link rel="stylesheet" href="/styles/reset-password.css" />
  </head>

  <body>
    <main class="reset-shell">
      <!-- LEFT SIDE -->
      <section class="showcase">
        <div class="showcase__content">
          <p class="showcase__eyebrow">Security Update</p>
          <h1>Set New<br />Password</h1>
          <p class="showcase__copy">
            Create a strong new password to secure your account and continue
            your cinematic journey.
          </p>
        </div>
      </section>

      <!-- RIGHT SIDE -->
      <section class="reset-panel">
        <!-- Dark Toggle -->
        <button
          id="darkToggle"
          class="dark-toggle"
          type="button"
          aria-pressed="false"
          aria-label="Toggle dark mode"
        >
          <!-- Sun (shown in dark mode) -->
          <svg class="icon-sun" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="4" />
            <line x1="12" y1="2" x2="12" y2="5" />
            <line x1="12" y1="19" x2="12" y2="22" />
            <line x1="2" y1="12" x2="5" y2="12" />
            <line x1="19" y1="12" x2="22" y2="12" />
            <line x1="4.22" y1="4.22" x2="6.34" y2="6.34" />
            <line x1="17.66" y1="17.66" x2="19.78" y2="19.78" />
            <line x1="4.22" y1="19.78" x2="6.34" y2="17.66" />
            <line x1="17.66" y1="6.34" x2="19.78" y2="4.22" />
          </svg>
          <!-- Moon (shown in light mode) -->
          <svg class="icon-moon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
          </svg>
        </button>

        <div class="panel-heading">
          <p>Secure your account</p>
          <h2>Reset Password</h2>
        </div>

        <form id="resetForm" class="reset-form" novalidate>
          <!-- PASSWORD FIELD -->
          <label class="field" for="userPassword">
            <span class="field__label">New password</span>

            <span class="field__control field__control--password">
              <input
                id="userPassword"
                name="password"
                type="password"
                placeholder="Enter new password"
                required
              />

              <button
                id="togglePassword"
                class="icon-button"
                type="button"
                aria-label="Show password"
              >
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path
                    d="M12 5c5.2 0 8.5 4.4 9.5 6.1.3.6.3 1.2 0 1.8C20.5 14.6 17.2 19 12 19s-8.5-4.4-9.5-6.1a1.8 1.8 0 0 1 0-1.8C3.5 9.4 6.8 5 12 5Zm0 2C7.8 7 5 10.6 4.3 12c.7 1.4 3.5 5 7.7 5s7-3.6 7.7-5C19 10.6 16.2 7 12 7Zm0 2.2A2.8 2.8 0 1 1 12 14.8a2.8 2.8 0 0 1 0-5.6Zm0 2A.8.8 0 1 0 12 12.8a.8.8 0 0 0 0-1.6Z"
                  />
                </svg>
              </button>
            </span>

            <span id="userPasswordError" class="field__error"></span>
          </label>

          <!-- PASSWORD STRENGTH -->
          <div class="strength-meter">
            <span id="strengthBar" class="strength-meter__bar"></span>
          </div>
          <p id="strengthText" class="strength-meter__text"></p>

          <!-- SUBMIT -->
          <button id="resetBtn" class="primary-button" type="submit">
            <span class="button__text">Update Password</span>
            <span class="button__loader"></span>
          </button>

          <p id="formStatus" class="form-status"></p>
        </form>
      </section>
    </main>

    <script>
      window.AUTH_API_BASE_URL = location.origin + '/api/auth';
    </script>

    <script type="module" src="/scripts/reset-password.js"></script>
  </body>
</html>
