<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book Seats | ZohoCine</title>
    <link rel="stylesheet" href="/styles/structure.css" />
    <link rel="stylesheet" href="/styles/bookings.css" />
  </head>
  <body>
    <header class="booking-header">
      <a class="back-link" href="/home.html">Back to Home</a>
      <div class="header-actions">
        <h1 class="brand">ZohoCine</h1>
        <button
          id="darkToggle"
          class="dark-toggle"
          type="button"
          aria-label="Toggle theme"
        >
          <svg class="icon-moon" viewBox="0 0 24 24">
            <path d="M21 12.8A9 9 0 1111.2 3 7 7 0 0021 12.8z" />
          </svg>
          <svg class="icon-sun" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="5" />
            <path
              d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"
            />
          </svg>
        </button>
      </div>
    </header>

    <main class="booking-page">
      <section class="booking-card">
        <p class="eyebrow">Movie Booking</p>
        <h2 id="movie-title">Loading movie...</h2>
        <p id="page-message" class="page-message">
          Select seats and book them.
        </p>

        <div class="seat-summary">
          <div class="summary-box">
            <span class="summary-label">Available</span>
            <strong id="available-count">0</strong>
          </div>
          <div class="summary-box">
            <span class="summary-label">Booked</span>
            <strong id="booked-count">0</strong>
          </div>
          <div class="summary-box">
            <span class="summary-label">Selected</span>
            <strong id="selected-count">0</strong>
          </div>
        </div>

        <!-- <div class="screen">Screen This Side</div> -->

        <div class="cinema-container">
          <!-- The 3D Glowing Screen -->
          <div class="cinema-screen-wrapper">
            <div class="cinema-screen"></div>
            <div class="screen-glow"></div>
            <p class="screen-text">SCREEN</p>
          </div>

          <!-- Your existing seat grid where JS injects the rows -->
          <div id="seat-grid"></div>
        </div>

        <div class="legend">
          <div class="legend-item">
            <span class="legend-seat available"></span>
            <span>Available</span>
          </div>
          <div class="legend-item">
            <span class="legend-seat selected"></span>
            <span>Selected</span>
          </div>
          <div class="legend-item">
            <span class="legend-seat booked"></span>
            <span>Booked</span>
          </div>
        </div>

        <div class="action-bar">
          <div>
            <p class="selected-label">Selected Seats</p>
            <p id="selected-seats" class="selected-seats">None</p>
          </div>
          <button id="book-btn" class="book-btn" disabled>
            Book Selected Seats
          </button>
        </div>
      </section>
    </main>

    <script>
      window.AUTH_API_BASE_URL = location.origin + "/api/auth";
      window.BOOKING_API_BASE = location.origin + "/api";
    </script>
    <script type="module" src="/scripts/bookings.js"></script>
  </body>
</html>
