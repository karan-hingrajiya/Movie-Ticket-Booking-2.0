<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password | ZohoCine</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Styles -->
    <link rel="stylesheet" href="/styles/structure.css" />
    <link rel="stylesheet" href="/styles/forgot-password.css" />
  </head>

  <body>
    <main class="forgot-shell">
      <!-- LEFT SIDE (SHOWCASE) -->
      <section class="showcase">
        <div class="showcase__content">
          <p class="showcase__eyebrow">Account Recovery</p>
          <h1>Forgot<br />Password?</h1>
          <p class="showcase__copy">
            Don’t worry — it happens. Enter your email and we’ll send you a
            secure reset link.
          </p>
        </div>
      </section>

      <!-- RIGHT SIDE (FORM PANEL) -->
      <section class="forgot-panel">
        <!-- Dark Toggle -->
        <button
          id="darkToggle"
          class="dark-toggle"
          type="button"
          aria-pressed="false"
          aria-label="Toggle dark mode"
        >
          <!-- Sun (shown in dark mode) -->
          <svg class="icon-sun" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="4" />
            <line x1="12" y1="2" x2="12" y2="5" />
            <line x1="12" y1="19" x2="12" y2="22" />
            <line x1="2" y1="12" x2="5" y2="12" />
            <line x1="19" y1="12" x2="22" y2="12" />
            <line x1="4.22" y1="4.22" x2="6.34" y2="6.34" />
            <line x1="17.66" y1="17.66" x2="19.78" y2="19.78" />
            <line x1="4.22" y1="19.78" x2="6.34" y2="17.66" />
            <line x1="17.66" y1="6.34" x2="19.78" y2="4.22" />
          </svg>
          <!-- Moon (shown in light mode) -->
          <svg class="icon-moon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
          </svg>
        </button>

        <div class="panel-heading">
          <p>Reset your access</p>
          <h2>Forgot Password</h2>
        </div>

        <form id="forgotForm" class="forgot-form" novalidate>
          <!-- EMAIL FIELD -->
          <label class="field" for="userEmail">
            <span class="field__label">Email address</span>
            <span class="field__control">
              <input
                id="userEmail"
                name="email"
                type="email"
                placeholder="you@example.com"
                required
              />
            </span>
            <span id="userEmailError" class="field__error"></span>
          </label>

          <!-- SUBMIT -->
          <button id="forgotBtn" class="primary-button" type="submit">
            <span class="button__text">Send Reset Link</span>
            <span class="button__loader"></span>
          </button>

          <p id="formStatus" class="form-status"></p>

          <p class="form-footer">
            Remember your password?
            <a href="/login.html" class="form-link">Sign in →</a>
          </p>
        </form>
      </section>
    </main>

    <script>
      window.AUTH_API_BASE_URL = location.origin + '/api/auth';
    </script>

    <script type="module" src="/scripts/forgot-password.js"></script>
  </body>
</html>
