<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | ZohoCine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles/structure.css">
    <link rel="stylesheet" href="/styles/login.css">
</head>
<body>
    <main class="login-shell">

        <!-- ══════════════════════════════════
             LEFT: SHOWCASE PANEL
        ══════════════════════════════════ -->
        <section class="showcase" aria-label="ZohoCine cinema experience">

            <!-- ── Decorative layer (aria-hidden) ── -->
            <div class="showcase__deco" aria-hidden="true">

                <!-- Animated film reel SVG -->
                <svg class="deco-reel" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <radialGradient id="reelGlow" cx="50%" cy="50%" r="50%">
                            <stop offset="0%"   stop-color="rgba(244,181,68,0.10)"/>
                            <stop offset="100%" stop-color="rgba(244,181,68,0)"/>
                        </radialGradient>
                    </defs>

                    <!-- Static outer halo ring -->
                    <circle cx="150" cy="150" r="148"
                        fill="none"
                        stroke="rgba(255,248,237,0.07)"
                        stroke-width="1"/>

                    <!-- Glow fill -->
                    <circle cx="150" cy="150" r="128" fill="url(#reelGlow)"/>

                    <!-- ── Rotating reel group ── -->
                    <g class="reel-rotate">

                        <!-- Outer reel ring -->
                        <circle cx="150" cy="150" r="128"
                            fill="none"
                            stroke="rgba(244,181,68,0.30)"
                            stroke-width="1.5"/>

                        <!-- Inner ring -->
                        <circle cx="150" cy="150" r="88"
                            fill="none"
                            stroke="rgba(244,181,68,0.18)"
                            stroke-width="1"/>

                        <!-- Three diameter spokes -->
                        <line x1="150" y1="22"  x2="150" y2="278"
                            stroke="rgba(244,181,68,0.16)" stroke-width="1.2"/>
                        <line x1="261" y1="86"  x2="39" y2="214"
                            stroke="rgba(244,181,68,0.16)" stroke-width="1.2"/>
                        <line x1="261" y1="214" x2="39" y2="86"
                            stroke="rgba(244,181,68,0.16)" stroke-width="1.2"/>

                        <!-- 12 sprocket holes at r=112 -->
                        <circle cx="150"  cy="38"  r="7" fill="none" stroke="rgba(244,181,68,0.48)" stroke-width="1.2"/>
                        <circle cx="206"  cy="53"  r="7" fill="none" stroke="rgba(244,181,68,0.48)" stroke-width="1.2"/>
                        <circle cx="247"  cy="94"  r="7" fill="none" stroke="rgba(244,181,68,0.48)" stroke-width="1.2"/>
                        <circle cx="262"  cy="150" r="7" fill="none" stroke="rgba(244,181,68,0.48)" stroke-width="1.2"/>
                        <circle cx="247"  cy="206" r="7" fill="none" stroke="rgba(244,181,68,0.48)" stroke-width="1.2"/>
                        <circle cx="206"  cy="247" r="7" fill="none" stroke="rgba(244,181,68,0.48)" stroke-width="1.2"/>
                        <circle cx="150"  cy="262" r="7" fill="none" stroke="rgba(244,181,68,0.48)" stroke-width="1.2"/>
                        <circle cx="94"   cy="247" r="7" fill="none" stroke="rgba(244,181,68,0.48)" stroke-width="1.2"/>
                        <circle cx="53"   cy="206" r="7" fill="none" stroke="rgba(244,181,68,0.48)" stroke-width="1.2"/>
                        <circle cx="38"   cy="150" r="7" fill="none" stroke="rgba(244,181,68,0.48)" stroke-width="1.2"/>
                        <circle cx="53"   cy="94"  r="7" fill="none" stroke="rgba(244,181,68,0.48)" stroke-width="1.2"/>
                        <circle cx="94"   cy="53"  r="7" fill="none" stroke="rgba(244,181,68,0.48)" stroke-width="1.2"/>

                        <!-- Center hub — outer ring -->
                        <circle cx="150" cy="150" r="28"
                            fill="rgba(244,181,68,0.06)"
                            stroke="rgba(244,181,68,0.42)"
                            stroke-width="1.5"/>
                        <!-- Center hub — inner ring -->
                        <circle cx="150" cy="150" r="17"
                            fill="rgba(244,181,68,0.10)"
                            stroke="rgba(244,181,68,0.54)"
                            stroke-width="1"/>
                        <!-- Center hub — core -->
                        <circle cx="150" cy="150" r="7"
                            fill="rgba(244,181,68,0.22)"
                            stroke="rgba(244,181,68,0.7)"
                            stroke-width="1"/>

                    </g><!-- /reel-rotate -->

                    <!-- Static dashed orbit ring -->
                    <circle cx="150" cy="150" r="138"
                        fill="none"
                        stroke="rgba(244,181,68,0.10)"
                        stroke-width="1"
                        stroke-dasharray="3 11"/>

                </svg><!-- /deco-reel -->


                <!-- Scattered sparkle stars -->
                <svg class="deco-stars" viewBox="0 0 560 560"
                    preserveAspectRatio="xMidYMid slice"
                    xmlns="http://www.w3.org/2000/svg">

                    <!-- 4-line sparkle helper:  translate to position, scale by changing stroke sizes -->

                    <!-- Gold sparkle – top left area -->
                    <g transform="translate(72, 130)" class="sparkle sparkle--1">
                        <line x1="0" y1="-13" x2="0" y2="13"
                            stroke="rgba(244,181,68,0.85)" stroke-width="2.2" stroke-linecap="round"/>
                        <line x1="-13" y1="0" x2="13" y2="0"
                            stroke="rgba(244,181,68,0.85)" stroke-width="2.2" stroke-linecap="round"/>
                        <line x1="-8"  y1="-8"  x2="8"  y2="8"
                            stroke="rgba(244,181,68,0.45)" stroke-width="1.4" stroke-linecap="round"/>
                        <line x1="8"   y1="-8"  x2="-8" y2="8"
                            stroke="rgba(244,181,68,0.45)" stroke-width="1.4" stroke-linecap="round"/>
                    </g>

                    <!-- Teal sparkle – upper right -->
                    <g transform="translate(448, 76)" class="sparkle sparkle--2">
                        <line x1="0" y1="-9"  x2="0" y2="9"
                            stroke="rgba(50,183,167,0.90)" stroke-width="2" stroke-linecap="round"/>
                        <line x1="-9" y1="0"  x2="9" y2="0"
                            stroke="rgba(50,183,167,0.90)" stroke-width="2" stroke-linecap="round"/>
                        <line x1="-6" y1="-6" x2="6" y2="6"
                            stroke="rgba(50,183,167,0.50)" stroke-width="1.2" stroke-linecap="round"/>
                        <line x1="6"  y1="-6" x2="-6" y2="6"
                            stroke="rgba(50,183,167,0.50)" stroke-width="1.2" stroke-linecap="round"/>
                    </g>

                    <!-- White sparkle – bottom right, big -->
                    <g transform="translate(390, 410)" class="sparkle sparkle--3">
                        <line x1="0"   y1="-20" x2="0"   y2="20"
                            stroke="rgba(255,248,237,0.55)" stroke-width="2.5" stroke-linecap="round"/>
                        <line x1="-20" y1="0"   x2="20"  y2="0"
                            stroke="rgba(255,248,237,0.55)" stroke-width="2.5" stroke-linecap="round"/>
                        <line x1="-13" y1="-13" x2="13"  y2="13"
                            stroke="rgba(255,248,237,0.28)" stroke-width="1.5" stroke-linecap="round"/>
                        <line x1="13"  y1="-13" x2="-13" y2="13"
                            stroke="rgba(255,248,237,0.28)" stroke-width="1.5" stroke-linecap="round"/>
                    </g>

                    <!-- Tiny gold – mid left -->
                    <g transform="translate(170, 430)" class="sparkle sparkle--4">
                        <line x1="0" y1="-6" x2="0" y2="6"
                            stroke="rgba(244,181,68,0.72)" stroke-width="1.6" stroke-linecap="round"/>
                        <line x1="-6" y1="0" x2="6" y2="0"
                            stroke="rgba(244,181,68,0.72)" stroke-width="1.6" stroke-linecap="round"/>
                    </g>

                    <!-- Teal sparkle – right mid -->
                    <g transform="translate(500, 320)" class="sparkle sparkle--5">
                        <line x1="0"   y1="-11" x2="0"   y2="11"
                            stroke="rgba(50,183,167,0.78)" stroke-width="2" stroke-linecap="round"/>
                        <line x1="-11" y1="0"   x2="11"  y2="0"
                            stroke="rgba(50,183,167,0.78)" stroke-width="2" stroke-linecap="round"/>
                        <line x1="-7"  y1="-7"  x2="7"   y2="7"
                            stroke="rgba(50,183,167,0.40)" stroke-width="1.2" stroke-linecap="round"/>
                        <line x1="7"   y1="-7"  x2="-7"  y2="7"
                            stroke="rgba(50,183,167,0.40)" stroke-width="1.2" stroke-linecap="round"/>
                    </g>

                    <!-- Tiny white sparkle – upper mid -->
                    <g transform="translate(285, 52)" class="sparkle sparkle--6">
                        <line x1="0" y1="-7" x2="0" y2="7"
                            stroke="rgba(255,248,237,0.50)" stroke-width="1.5" stroke-linecap="round"/>
                        <line x1="-7" y1="0" x2="7" y2="0"
                            stroke="rgba(255,248,237,0.50)" stroke-width="1.5" stroke-linecap="round"/>
                    </g>

                    <!-- Dot clusters — give depth -->
                    <circle cx="240" cy="68"  r="3"   fill="rgba(244,181,68,0.55)"/>
                    <circle cx="255" cy="80"  r="1.8" fill="rgba(244,181,68,0.40)"/>
                    <circle cx="230" cy="82"  r="2.2" fill="rgba(244,181,68,0.30)"/>

                    <circle cx="118" cy="370" r="2.8" fill="rgba(50,183,167,0.55)"/>
                    <circle cx="132" cy="382" r="1.6" fill="rgba(50,183,167,0.35)"/>

                    <circle cx="420" cy="175" r="2"   fill="rgba(255,248,237,0.42)"/>
                    <circle cx="432" cy="188" r="1.4" fill="rgba(255,248,237,0.28)"/>

                    <circle cx="60"  cy="280" r="2.4" fill="rgba(244,181,68,0.38)"/>
                    <circle cx="490" cy="460" r="2"   fill="rgba(50,183,167,0.38)"/>

                </svg><!-- /deco-stars -->


                <!-- Vertical film strip on the right edge -->
                <div class="film-strip">
                    <div class="film-strip__track">
                        <!-- 14 frames, duplicated for seamless loop -->
                        <div class="film-frame"></div>
                        <div class="film-frame"></div>
                        <div class="film-frame"></div>
                        <div class="film-frame"></div>
                        <div class="film-frame"></div>
                        <div class="film-frame"></div>
                        <div class="film-frame"></div>
                        <div class="film-frame"></div>
                        <div class="film-frame"></div>
                        <div class="film-frame"></div>
                        <div class="film-frame"></div>
                        <div class="film-frame"></div>
                        <div class="film-frame"></div>
                        <div class="film-frame"></div>
                        <!-- duplicate set for seamless loop -->
                        <div class="film-frame"></div>
                        <div class="film-frame"></div>
                        <div class="film-frame"></div>
                        <div class="film-frame"></div>
                        <div class="film-frame"></div>
                        <div class="film-frame"></div>
                        <div class="film-frame"></div>
                        <div class="film-frame"></div>
                        <div class="film-frame"></div>
                        <div class="film-frame"></div>
                        <div class="film-frame"></div>
                        <div class="film-frame"></div>
                        <div class="film-frame"></div>
                        <div class="film-frame"></div>
                    </div>
                </div><!-- /film-strip -->

            </div><!-- /showcase__deco -->


            <!-- ── Heading content ── -->
            <div class="showcase__content">
                <p class="showcase__eyebrow">Your Cinema Pass</p>
                <h1>Welcome<br>Back</h1>
                <p class="showcase__copy">
                    Your seats are waiting. Sign in and pick up right where the story left off.
                </p>
            </div>

        </section><!-- /showcase -->


        <!-- ══════════════════════════════════
             RIGHT: LOGIN PANEL
        ══════════════════════════════════ -->
        <section class="login-panel" aria-label="Sign in to your account">

            <!-- Dark-mode toggle -->
            <button id="darkToggle" class="dark-toggle" type="button"
                    aria-pressed="false" aria-label="Toggle dark mode">
                <!-- Sun (shown in dark mode) -->
                <svg class="icon-sun" viewBox="0 0 24 24" aria-hidden="true">
                    <circle cx="12" cy="12" r="4"/>
                    <line x1="12" y1="2"     x2="12" y2="5"/>
                    <line x1="12" y1="19"    x2="12" y2="22"/>
                    <line x1="2"  y1="12"    x2="5"  y2="12"/>
                    <line x1="19" y1="12"    x2="22" y2="12"/>
                    <line x1="4.22"  y1="4.22"  x2="6.34"  y2="6.34"/>
                    <line x1="17.66" y1="17.66" x2="19.78" y2="19.78"/>
                    <line x1="4.22"  y1="19.78" x2="6.34"  y2="17.66"/>
                    <line x1="17.66" y1="6.34"  x2="19.78" y2="4.22"/>
                </svg>
                <!-- Moon (shown in light mode) -->
                <svg class="icon-moon" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
            </button>

            <div class="panel-heading">
                <p>Start the show</p>
                <h2>Sign in</h2>
            </div>

            <form id="loginForm" class="login-form" novalidate>

                <label class="field" for="userEmail">
                    <span class="field__label">Email address</span>
                    <span class="field__control">
                        <input id="userEmail" name="email" type="email"
                               autocomplete="username"
                               placeholder="you@example.com"
                               required>
                    </span>
                    <span id="userEmailError" class="field__error" aria-live="polite"></span>
                </label>

                <label class="field" for="userPassword">
                    <span class="field__label">Password</span>
                    <span class="field__control field__control--password">
                        <input id="userPassword" name="password" type="password"
                               autocomplete="current-password"
                               placeholder="Your password"
                               required>
                        <button id="togglePassword" class="icon-button"
                                type="button" aria-label="Show password">
                            <svg viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M12 5c5.2 0 8.5 4.4 9.5 6.1.3.6.3 1.2 0 1.8C20.5 14.6 17.2 19 12 19s-8.5-4.4-9.5-6.1a1.8 1.8 0 0 1 0-1.8C3.5 9.4 6.8 5 12 5Zm0 2C7.8 7 5 10.6 4.3 12c.7 1.4 3.5 5 7.7 5s7-3.6 7.7-5C19 10.6 16.2 7 12 7Zm0 2.2A2.8 2.8 0 1 1 12 14.8a2.8 2.8 0 0 1 0-5.6Zm0 2A.8.8 0 1 0 12 12.8a.8.8 0 0 0 0-1.6Z"/>
                            </svg>
                        </button>
                    </span>
                    <!-- <span class="strength-meter" aria-hidden="true">
                        <span id="passwordStrengthBar" class="strength-meter__bar"></span>
                    </span> -->
                    <!-- <span id="passwordStrengthText" class="strength-meter__text">Start typing</span> -->
                    <span id="userPasswordError" class="field__error" aria-live="polite"></span>
                </label>
                <p class="forgot-row">
                    <a href="/forgot-password.html" class="form-link">Forgot password?</a>
                </p>

                <button id="loginBtn" class="primary-button" type="submit">
                    <span class="button__text">Sign in</span>
                    <span class="button__loader" aria-hidden="true"></span>
                </button>

                <p id="formStatus" class="form-status" aria-live="polite"></p>

                <p class="form-footer">
                    New here? <a href="/register.html" class="form-link">Create an account →</a>
                </p>
            </form>

        </section><!-- /login-panel -->

    </main>

    <script>
        window.AUTH_API_BASE_URL = location.origin + '/api/auth';
    </script>
    <script type="module" src="/scripts/login-user.js"></script>
</body>
</html>
